<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusGraph</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --user-bubble: #e3f2fd;
    --assistant-bubble: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #666;
    --primary: #1976d2;
    --primary-hover: #1565c0;
    --border: #e0e0e0;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--primary); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header span { font-size: 13px; opacity: 0.85; }
  .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px 0; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .msg { display: flex; flex-direction: column; max-width: 780px; margin: 0 auto; width: 100%; }
  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }
  .bubble { padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 15px; max-width: 85%; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .sources { margin-top: 6px; width: 100%; }
  .sources summary { cursor: pointer; font-size: 13px; color: var(--primary); padding: 4px 0; }
  .sources-list { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .source-item { font-size: 12px; color: var(--text-secondary); padding: 3px 8px; background: #fafafa; border-radius: 4px; border: 1px solid var(--border); }
  .rating { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
  .rating-label { font-size: 12px; color: var(--text-secondary); margin-right: 4px; }
  .rating button { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; background: white; cursor: pointer; font-size: 13px; color: #999; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .rating button:hover { border-color: var(--primary); color: var(--primary); background: #e3f2fd; }
  .rating .rated { border-color: #4caf50; color: #4caf50; background: #e8f5e9; cursor: default; }
  .rating .thank-you { font-size: 12px; color: #4caf50; margin-left: 4px; }
  .input-area { border-top: 1px solid var(--border); background: var(--card); padding: 12px 16px; flex-shrink: 0; }
  .input-row { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 24px; font-size: 15px; outline: none; }
  .input-row input:focus { border-color: var(--primary); }
  .input-row button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 24px; font-size: 15px; cursor: pointer; font-weight: 500; }
  .input-row button:hover { background: var(--primary-hover); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading { display: flex; gap: 6px; padding: 12px 16px; align-items: center; color: var(--text-secondary); font-size: 14px; }
  .loading .dots { display: flex; gap: 4px; }
  .loading .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.4s infinite ease-in-out both; }
  .loading .dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading .dots span:nth-child(2) { animation-delay: -0.16s; }
  .loading .dots span:nth-child(3) { animation-delay: 0s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }
  @media (max-width: 600px) { .bubble { max-width: 95%; } .header { padding: 12px 16px; } .chat-area { padding: 12px 8px 0; } .input-area { padding: 8px 12px; } }
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F52E; NexusGraph</h1>
  <span>GraphRAG Knowledge Base</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <h2>Ask a question</h2>
    <p>Type a question about the TechQA knowledge base to get started.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="questionInput" placeholder="Ask a question..." autofocus>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const API = '/api/v1';
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');

let sessionId = localStorage.getItem('nexusgraph_sid');
if (!sessionId) {
  sessionId = Math.random().toString(36).substring(2, 10);
  localStorage.setItem('nexusgraph_sid', sessionId);
}
let loading = false;
const ratedSet = new Set();

function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

function addMessage(role, text, sources) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  if (role === 'assistant' && sources && sources.length > 0) {
    const details = document.createElement('details');
    details.className = 'sources';
    const summary = document.createElement('summary');
    summary.textContent = 'Sources (' + sources.length + ')';
    details.appendChild(summary);
    const list = document.createElement('div');
    list.className = 'sources-list';
    sources.forEach(function(s) {
      const item = document.createElement('div');
      item.className = 'source-item';
      item.textContent = s;
      list.appendChild(item);
    });
    details.appendChild(list);
    div.appendChild(details);
  }

  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function addRating(container) {
  const idx = chatArea.querySelectorAll('.msg.assistant').length - 1;
  if (ratedSet.has(idx)) return;

  const ratingDiv = document.createElement('div');
  ratingDiv.className = 'rating';
  const label = document.createElement('span');
  label.className = 'rating-label';
  label.textContent = 'Rate:';
  ratingDiv.appendChild(label);

  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.addEventListener('click', function() {
      if (ratedSet.has(idx)) return;
      const msgs = chatArea.querySelectorAll('.msg');
      const qEl = msgs[idx * 2];
      const aEl = msgs[idx * 2 + 1];
      const q = qEl ? qEl.querySelector('.bubble').textContent : '';
      const a = aEl ? aEl.querySelector('.bubble').textContent : '';
      fetch(API + '/graphrag/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, query: q, response: a, rating: i })
      }).then(function(r) {
        if (r.ok) {
          ratedSet.add(idx);
          ratingDiv.querySelectorAll('button').forEach(function(b) { b.className = 'rated'; b.disabled = true; });
          const thanks = document.createElement('span');
          thanks.className = 'thank-you';
          thanks.textContent = '&#x2705; Thank you';
          ratingDiv.appendChild(thanks);
        }
      }).catch(function() {});
    });
    ratingDiv.appendChild(btn);
  }
  container.appendChild(ratingDiv);
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'loadingMsg';
  const bubble = document.createElement('div');
  bubble.className = 'loading';
  bubble.innerHTML = '<span>Thinking</span><div class="dots"><span></span><span></span><span></span></div>';
  div.appendChild(bubble);
  chatArea.appendChild(div);
  scrollBottom();
}

function removeLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

async function send() {
  const q = input.value.trim();
  if (!q || loading) return;
  input.value = '';
  loading = true;
  sendBtn.disabled = true;

  addMessage('user', q);
  addLoading();

  try {
    const r = await fetch(API + '/graphrag/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, top_k: 5 })
    });
    removeLoading();
    if (r.ok) {
      const d = await r.json();
      const answer = d.answer || '(empty)';
      const sources = d.source_docs || [];
      const container = addMessage('assistant', answer, sources);
      addRating(container);
    } else {
      addMessage('assistant', 'Error: ' + r.status + ' ' + r.statusText);
    }
  } catch (e) {
    removeLoading();
    addMessage('assistant', 'Server unreachable. Is the API running on port 8000?');
  }
  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
