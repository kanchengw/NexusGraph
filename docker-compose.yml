version: '3.8'

services:
  neo4j:
    profiles: [online, offline]
    image: neo4j:5-community
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    profiles: [online, offline]
    image: pgvector/pgvector:pg16
    container_name: graphrag-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: [online]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV:-development}
    container_name: graphrag-app
    ports:
      - "8000:8000"
    env_file:
      - .env.${APP_ENV:-development}
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      neo4j:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    profiles: [online]
    image: prom/prometheus:latest
    container_name: graphrag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    profiles: [online]
    image: grafana/grafana:latest
    container_name: graphrag-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards/json:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
